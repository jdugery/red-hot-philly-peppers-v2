media:
  input: public/images
  output: /images

content:
  - name: home
    label: Homepage
    type: file
    path: src/content/home/home.md
    fields:
      - name: eyebrow
        label: Top Small Text
        type: string
        required: true

      - name: headline
        label: Main Headline
        type: text
        required: true

      - name: description
        label: Hero Description
        type: text
        required: true

      - name: aboutTitle
        label: About Heading
        type: string
        required: true

      - name: aboutText
        label: About Text
        type: text
        required: true

      - name: contactTitle
        label: Contact Heading
        type: string
        required: true

      - name: contactText
        label: Contact Text
        type: text
        required: true

  - name: peppers
    label: Pepper Varieties
    type: collection
    path: src/content/peppers
    filename: "{primary}.md"
    view:
      fields: [name, species, heat, available]
    fields:
      - name: name
        label: Name
        type: string
        required: true

      - name: species
        label: Species
        type: string
        required: true

      - name: heat
        label: Heat
        type: string
        required: true

      - name: color
        label: Color
        type: string

      - name: description
        label: Short Description
        type: text
        required: true

      - name: image
        label: Main Photo
        type: image

      - name: available
        label: Available
        type: boolean
        default: false

      - name: body
        label: Full Description
        type: rich-text